name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Lovable URLs static test
        run: npx vitest run src/tests/no-lovable-links.test.ts
      - name: Run Lovable runtime behavior test
        run: npx vitest run src/tests/no-lovable-runtime.test.tsx
